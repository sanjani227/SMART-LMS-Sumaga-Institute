version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sumaga-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-sanjani2001}
      MYSQL_DATABASE: ${DB_NAME:-sumaga_lms}
      MYSQL_USER: sumaga_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-sanjani2001}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-sanjani2001}"]
      timeout: 20s
      retries: 10
      interval: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sumaga-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-sanjani2001}
      - DB_NAME=${DB_NAME:-sumaga_lms}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_here}
      - PORT=3000
      - FRONTEND_URL=http://98.70.34.60:3001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://98.70.34.60:3000
    container_name: sumaga-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - lms-network

volumes:
  mysql_data:
    driver: local

networks:
  lms-network:
    driver: bridge